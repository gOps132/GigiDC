name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: gigi-discord-bot-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION_FILE: go.mod
  IMAGE_NAME: gigi-discord-bot

jobs:
  go-check:
    name: Go Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify foundation boundaries
        run: |
          missing_paths=0

          for path in src test supabase dist terraform package.json package-lock.json tsconfig.json docs/terraform.md; do
            if [[ -e "${path}" ]]; then
              echo "Removed foundation path still exists: ${path}" >&2
              missing_paths=1
            fi
          done

          for path in .codex .understand-anything AGENTS.md docs/agent-skills.md docs/human-agent-workflow.md docs/project-visualization-workflow.md docs/knowledge-workflow.md knowledge; do
            if [[ -n "$(git ls-files "${path}")" ]]; then
              echo "Agent artifact still tracked: ${path}" >&2
              missing_paths=1
            fi
          done

          for path in .agents/probe .codex/probe .understand-anything/probe AGENTS.md AGENTS.local.md probe.agent.md probe.agent.local.md; do
            if ! git check-ignore -q "${path}"; then
              echo "Agent artifact is not ignored: ${path}" >&2
              missing_paths=1
            fi
          done

          exit "${missing_paths}"

      - name: Scan for obvious committed secrets
        run: |
          if git grep -nE '(sk-[A-Za-z0-9_-]{20,}|xox[baprs]-[A-Za-z0-9-]{20,}|discord[a-z_]*token[[:space:]]*=[[:space:]]*[^[:space:]<#]+|openai[a-z_]*key[[:space:]]*=[[:space:]]*[^[:space:]<#]+)' -- . ':!.env.example'; then
            echo "Potential secret-looking value found." >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [[ -n "${files}" ]]; then
            echo "${files}" >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build binary
        run: |
          go build \
            -ldflags "-X github.com/gOps132/GigiDC/internal/buildinfo.Version=${GITHUB_SHA} -X github.com/gOps132/GigiDC/internal/buildinfo.Commit=${GITHUB_SHA} -X github.com/gOps132/GigiDC/internal/buildinfo.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            ./cmd/gigi

  compose-smoke:
    name: Docker Compose Smoke
    runs-on: ubuntu-latest
    needs:
      - go-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build and start Compose stack
        run: docker compose up --build -d

      - name: Verify health endpoints
        run: |
          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8080/healthz >/dev/null \
              && curl --fail --silent http://127.0.0.1:8080/readyz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs --tail=100
          exit 1

      - name: Stop Compose stack
        if: always()
        run: docker compose down --volumes

  package:
    name: Package Docker Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - go-check
      - compose-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build image
        run: |
          docker build \
            --build-arg VERSION="${GITHUB_SHA}" \
            --build-arg COMMIT="${GITHUB_SHA}" \
            --build-arg BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "${IMAGE_NAME}:${GITHUB_SHA}" .

      - name: Save image
        run: docker save "${IMAGE_NAME}:${GITHUB_SHA}" -o gigi-discord-bot-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: gigi-discord-bot-image
          path: gigi-discord-bot-image.tar
          retention-days: 7

      - name: Upload deploy files
        uses: actions/upload-artifact@v4
        with:
          name: gigi-discord-bot-deploy
          path: |
            compose.prod.yaml
            db/migrations/*.sql
            scripts/install-release.sh
          retention-days: 7

  deploy:
    name: Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - package
    runs-on: ubuntu-latest

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: gigi-discord-bot-image
          path: .

      - name: Download deploy files
        uses: actions/download-artifact@v4
        with:
          name: gigi-discord-bot-deploy
          path: release

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [[ -z "${DEPLOY_HOST}" || -z "${DEPLOY_SSH_KEY}" ]]; then
            echo "Missing required deploy secrets." >&2
            exit 1
          fi

          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${DEPLOY_SSH_KEY}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "${DEPLOY_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Upload release to EC2
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER:-ubuntu}@${DEPLOY_HOST}" \
            "rm -rf /tmp/gigi-discord-bot-release && mkdir -p /tmp/gigi-discord-bot-release/db/migrations"
          scp -P "${DEPLOY_PORT:-22}" gigi-discord-bot-image.tar \
            "${DEPLOY_USER:-ubuntu}@${DEPLOY_HOST}:/tmp/gigi-discord-bot-image.tar"
          scp -P "${DEPLOY_PORT:-22}" release/compose.prod.yaml \
            "${DEPLOY_USER:-ubuntu}@${DEPLOY_HOST}:/tmp/gigi-discord-bot-release/compose.prod.yaml"
          scp -P "${DEPLOY_PORT:-22}" release/db/migrations/*.sql \
            "${DEPLOY_USER:-ubuntu}@${DEPLOY_HOST}:/tmp/gigi-discord-bot-release/db/migrations/"
          scp -P "${DEPLOY_PORT:-22}" release/scripts/install-release.sh \
            "${DEPLOY_USER:-ubuntu}@${DEPLOY_HOST}:/tmp/gigi-discord-bot-release/install-release.sh"

      - name: Install release on EC2
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER:-ubuntu}@${DEPLOY_HOST}" \
            "sudo IMAGE_TAG='${GITHUB_SHA}' RELEASE_DIR=/tmp/gigi-discord-bot-release bash /tmp/gigi-discord-bot-release/install-release.sh"
