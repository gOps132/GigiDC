name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: gigi-discord-bot-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION_FILE: go.mod

jobs:
  go-check:
    name: Go Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify foundation boundaries
        run: |
          missing_paths=0

          for path in src test supabase dist terraform package.json package-lock.json tsconfig.json docs/terraform.md; do
            if [[ -e "${path}" ]]; then
              echo "Removed foundation path still exists: ${path}" >&2
              missing_paths=1
            fi
          done

          for path in .codex .understand-anything AGENTS.md docs/agent-skills.md docs/human-agent-workflow.md docs/project-visualization-workflow.md docs/knowledge-workflow.md knowledge; do
            if [[ -n "$(git ls-files "${path}")" ]]; then
              echo "Agent artifact still tracked: ${path}" >&2
              missing_paths=1
            fi
          done

          for path in .agents/probe .codex/probe .understand-anything/probe AGENTS.md AGENTS.local.md probe.agent.md probe.agent.local.md; do
            if ! git check-ignore -q "${path}"; then
              echo "Agent artifact is not ignored: ${path}" >&2
              missing_paths=1
            fi
          done

          exit "${missing_paths}"

      - name: Scan for obvious committed secrets
        run: |
          if git grep -nE '(sk-[A-Za-z0-9_-]{20,}|xox[baprs]-[A-Za-z0-9-]{20,}|discord[a-z_]*token[[:space:]]*=[[:space:]]*[^[:space:]<#]+|openai[a-z_]*key[[:space:]]*=[[:space:]]*[^[:space:]<#]+)' -- . ':!.env.example'; then
            echo "Potential secret-looking value found." >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [[ -n "${files}" ]]; then
            echo "${files}" >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build binary
        run: |
          go build \
            -ldflags "-X github.com/gOps132/GigiDC/internal/buildinfo.Version=${GITHUB_SHA} -X github.com/gOps132/GigiDC/internal/buildinfo.Commit=${GITHUB_SHA} -X github.com/gOps132/GigiDC/internal/buildinfo.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            ./cmd/gigi

  compose-smoke:
    name: Docker Compose Smoke
    runs-on: ubuntu-latest
    needs:
      - go-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build and start Compose stack
        run: docker compose up --build -d

      - name: Verify health endpoints
        run: |
          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8080/healthz >/dev/null \
              && curl --fail --silent http://127.0.0.1:8080/readyz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs --tail=100
          exit 1

      - name: Stop Compose stack
        if: always()
        run: docker compose down --volumes
