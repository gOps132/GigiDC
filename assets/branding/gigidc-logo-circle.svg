<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="GigiDC logo">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="50" />
    </clipPath>
  </defs>
  <image
    href="./gigidc-logo-square.png"
    width="100"
    height="100"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#circle-clip)"
  />
</svg>
