services:
  app:
    build:
      context: .
      args:
        VERSION: dev
        COMMIT: local
        BUILD_TIME: local
    environment:
      GIGI_ENV: development
      GIGI_HTTP_ADDR: ":8080"
      GIGI_DATABASE_URL: postgres://gigi:gigi@db:5432/gigi?sslmode=disable
      DISCORD_TOKEN: ""
      DISCORD_CLIENT_ID: ""
      OPENAI_API_KEY: ""
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: gigi
      POSTGRES_USER: gigi
      POSTGRES_PASSWORD: gigi
    ports:
      - "127.0.0.1:${GIGI_DB_PORT:-55432}:5432"
    volumes:
      - gigi-db:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigi -d gigi"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  gigi-db:
