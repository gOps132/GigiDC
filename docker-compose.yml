services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gigi}
      POSTGRES_USER: ${POSTGRES_USER:-gigi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
    volumes:
      - gigi-db:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-gigi} -d $${POSTGRES_DB:-gigi}"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${GIGI_VERSION:-coolify}
        COMMIT: ${GIGI_COMMIT:-unknown}
        BUILD_TIME: ${GIGI_BUILD_TIME:-unknown}
    restart: unless-stopped
    environment:
      GIGI_ENV: ${GIGI_ENV:-production}
      GIGI_HTTP_ADDR: :8080
      GIGI_DATABASE_URL: postgres://${POSTGRES_USER:-gigi}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:-gigi}?sslmode=disable
      GIGI_DISCORD_ENABLED: ${GIGI_DISCORD_ENABLED:-false}
      GIGI_DISCORD_SYNC_COMMANDS: ${GIGI_DISCORD_SYNC_COMMANDS:-false}
      GIGI_DISCORD_GUILD_ID: ${GIGI_DISCORD_GUILD_ID:-}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  gigi-db:
