services:
  app:
    image: gigi-discord-bot:${GIGI_IMAGE_TAG:-latest}
    env_file:
      - /etc/gigi-discord-bot/gigi-discord-bot.env
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    env_file:
      - /etc/gigi-discord-bot/gigi-discord-bot.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gigi}
      POSTGRES_USER: ${POSTGRES_USER:-gigi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - gigi-db:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-gigi} -d $${POSTGRES_DB:-gigi}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  gigi-db:
